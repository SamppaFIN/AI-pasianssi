<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Solitaire - Infinite Edge</title>
    <meta name="description" content="A premium AI-powered Solitaire game where you can watch AI play or play yourself.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app-container">
        <!-- Header -->
        <header class="glass-panel">
            <div class="logo">
                <h1>AI Solitaire</h1>
                <span class="badge">Infinite</span>
            </div>
            
            <div class="controls">
                <div class="ai-status">
                    <span class="status-indicator"></span>
                    <span id="ai-status-text">AI Idle</span>
                </div>
                <button id="btn-ai-play" class="btn primary">Auto-Play</button>
                <button id="btn-ai-pause" class="btn secondary" disabled>Pause</button>
                <button id="btn-ai-step" class="btn secondary">Step AI</button>
                <button id="btn-settings" class="btn icon-btn" title="Settings">⚙️</button>
            </div>
        </header>

        <!-- Game Board -->
        <main id="game-board">
            <div class="board-top">
                <div class="stock-waste-container">
                    <div id="stock" class="pile stock-pile"></div>
                    <div id="waste" class="pile waste-pile"></div>
                </div>
                <div class="foundations-container">
                    <div id="foundation-0" class="pile foundation-pile" data-suit="hearts"></div>
                    <div id="foundation-1" class="pile foundation-pile" data-suit="diamonds"></div>
                    <div id="foundation-2" class="pile foundation-pile" data-suit="clubs"></div>
                    <div id="foundation-3" class="pile foundation-pile" data-suit="spades"></div>
                </div>
            </div>
            
            <div class="board-bottom">
                <div id="tableau-0" class="pile tableau-pile"></div>
                <div id="tableau-1" class="pile tableau-pile"></div>
                <div id="tableau-2" class="pile tableau-pile"></div>
                <div id="tableau-3" class="pile tableau-pile"></div>
                <div id="tableau-4" class="pile tableau-pile"></div>
                <div id="tableau-5" class="pile tableau-pile"></div>
                <div id="tableau-6" class="pile tableau-pile"></div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h2>Settings</h2>
            <div class="form-group">
                <label for="api-key">OpenRouter API Key</label>
                <input type="password" id="api-key" placeholder="sk-or-v1-...">
                <small>Stored locally in your browser.</small>
            </div>
            <div class="form-group">
                <label for="ai-model">AI Model</label>
                <select id="ai-model">
                    <option value="openai/gpt-4o-mini">GPT-4o Mini (Fast)</option>
                    <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
                    <option value="google/gemini-pro-1.5">Gemini 1.5 Pro</option>
                    <option value="openai/gpt-4o">GPT-4o</option>
                </select>
            </div>
            <div class="form-group">
                <label for="ai-delay">AI Move Delay (ms)</label>
                <input type="number" id="ai-delay" value="1000" min="100" max="5000" step="100">
            </div>
            <div class="modal-actions">
                <button id="btn-save-settings" class="btn primary">Save & Close</button>
            </div>
        </div>
    </div>

    <!-- AI Thinking Overlay -->
    <div id="ai-thinking-overlay" class="hidden">
        <div class="spinner"></div>
        <span>AI is thinking...</span>
    </div>

    <script type="module" src="src/app.js"></script>
</body>
</html>
